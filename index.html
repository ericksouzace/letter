<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

  <title>Letreiro Pro</title>

  <meta name="theme-color" content="#1f1e24" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Letreiro Pro" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --font-mono: "Courier New", ui-monospace, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

      --bg: #1f1e24;
      --panel: #24232b;
      --input: #15141b;
      --chip: #302f39;
      --line: #3c3b46;

      --text: #f4f0e8;
      --muted: #a09cad;

      --yellow: #f4c95d;
      --teal: #31c6aa;
      --red: #ff6385;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      font-family: var(--font-sans);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    .app {
      width: 100%;
      min-width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      background: var(--bg);
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow-x: hidden;
    }

    .topbar {
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(31, 30, 36, 0.97);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dial {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--input);
      border: 1px solid var(--line);
      color: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .top-info {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .counter {
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      width: 100%;
      padding: 14px;
      padding-bottom: calc(34px + env(safe-area-inset-bottom));
    }

    .label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 2px 8px;
    }

    .quick {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 8px;
    }

    input {
      width: 100%;
      height: 50px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--input);
      color: var(--text);
      padding: 0 15px;
      font-size: 20px;
      font-weight: 900;
      outline: none;
      text-transform: uppercase;
    }

    button {
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-weight: 900;
      cursor: pointer;
    }

    .best {
      height: 50px;
      border-radius: 14px;
      background: var(--yellow);
      color: #221a05;
      font-size: 14px;
    }

    .letters {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
    }

    .letter {
      aspect-ratio: 1;
      border-radius: 10px;
      background: var(--chip);
      border: 1px solid var(--line);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .letter.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #211a05;
    }

    .toggle {
      width: 100%;
      display: flex;
      gap: 4px;
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 4px;
    }

    .toggle div {
      flex: 1;
      text-align: center;
      padding: 12px 4px;
      border-radius: 11px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      user-select: none;
    }

    .toggle .active.lang {
      background: var(--teal);
      color: #062019;
    }

    .toggle .active.filter {
      background: var(--yellow);
      color: #211a05;
    }

    .suggestion {
      display: grid;
      grid-template-columns: 1fr 98px;
      gap: 8px;
    }

    .chosen {
      min-height: 62px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: var(--input);
      padding: 11px 13px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .chosen small {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .chosen strong {
      font-family: var(--font-mono);
      color: var(--yellow);
      font-size: 23px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .copy {
      border-radius: 15px;
      background: var(--teal);
      color: #062019;
      font-size: 14px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .used-btn {
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      font-size: 13px;
    }

    .clear {
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255, 99, 133, 0.6);
      background: transparent;
      color: var(--red);
      font-size: 13px;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
    }

    .word {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--chip);
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text);
    }

    .word.priority {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    .word.used {
      opacity: 0.35;
      text-decoration: line-through;
    }

    .flag {
      font-size: 9px;
      padding: 2px 4px;
      border-radius: 5px;
      background: var(--input);
      color: var(--muted);
      text-decoration: none;
    }

    .empty {
      width: 100%;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 18px 10px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .history {
      border-top: 1px solid var(--line);
      padding-top: 13px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      background: #101016;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 11px 15px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      transition: 0.22s ease;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="dial" id="dial">S</div>
      <div class="top-info">
        <div class="title">Letreiro Pro</div>

      </div>

    <section class="content">

      <div class="label">Filtro</div>

        <div data-filter="unused">Sem repetidas</div>

      <div class="label">Sugestão</div>
      <div class="suggestion">
        <div class="chosen">
          <small>Palavra escolhida</small>
          <strong id="chosenWord">---</strong>
        </div>
        <button class="copy" id="copyBtn">Copiar</button>
      </div>

      <div class="actions">
        <button class="used-btn" id="markBtn">Marcar usada</button>
        <button class="clear" id="clearBtn">Limpar histórico</button>
      </div>

      <div class="label">Palavras <span style="color: var(--yellow);">●</span> = termina em Y/X</div>
      <div class="word-list" id="wordList"></div>

      <div class="label">Histórico</div>
      <div class="history" id="history">Nenhuma palavra usada ainda.</div>
    </section>
  </main>

  <div class="toast" id="toast">Ok</div>

    const state = {
      letter: "S",
      lang: "both",
      filter: "all",
      chosen: "",
      used: JSON.parse(localStorage.getItem("letreiro_used_v3") || "[]")
    };

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    const dial = document.getElementById("dial");
    const counter = document.getElementById("counter");
    const letterInput = document.getElementById("letterInput");
    const letters = document.getElementById("letters");
    const wordList = document.getElementById("wordList");
    const chosenWord = document.getElementById("chosenWord");
    const history = document.getElementById("history");
    const toast = document.getElementById("toast");

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function priority(word) {
      const clean = normalize(word);
      return clean.endsWith("y") || clean.endsWith("x");
    }

    function saveUsed() {
      localStorage.setItem("letreiro_used_v3", JSON.stringify(state.used));
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1300);
    }

    function getWords() {
      let list = WORDS.filter(item => {
        const clean = normalize(item.w);
        const matchLetter = clean.startsWith(normalize(state.letter));
        const matchLang = state.lang === "both" || item.l === state.lang;
        return matchLetter && matchLang;
      }).map(item => ({
        ...item,
        priority: priority(item.w),
        used: state.used.includes(item.w)
      }));

      if (state.filter === "priority") {
        list = list.filter(item => item.priority);
      }

      if (state.filter === "unused") {
        list = list.filter(item => !item.used);
      }

      return list.sort((a, b) => {
        if (a.used !== b.used) return a.used ? 1 : -1;
        if (a.priority !== b.priority) return b.priority - a.priority;
        return a.w.localeCompare(b.w);
      });
    }

    function renderLetters() {
      letters.innerHTML = "";

      alphabet.forEach(letter => {
        const el = document.createElement("div");
        el.className = "letter" + (letter === state.letter ? " active" : "");
        el.textContent = letter;

        el.onclick = () => {
          state.letter = letter;
          letterInput.value = letter;
          render();
        };

        letters.appendChild(el);
      });
    }

    function renderToggles() {
      document.querySelectorAll("#langToggle div").forEach(el => {
        el.classList.toggle("active", el.dataset.lang === state.lang);
        el.classList.toggle("lang", el.dataset.lang === state.lang);
      });

      document.querySelectorAll("#filterToggle div").forEach(el => {
        el.classList.toggle("active", el.dataset.filter === state.filter);
        el.classList.toggle("filter", el.dataset.filter === state.filter);
      });
    }

    function renderWords() {
      const list = getWords();
      wordList.innerHTML = "";

      if (list.length === 0) {
        wordList.innerHTML = '<div class="empty">Nenhuma palavra encontrada.</div>';
        return;
      }

      list.forEach(item => {
        const el = document.createElement("div");
        el.className = "word" + (item.priority ? " priority" : "") + (item.used ? " used" : "");

        el.innerHTML = `
          <span>${item.w}</span>
          <span class="flag">${item.l.toUpperCase()}</span>
        `;

        el.onclick = () => {
          state.chosen = item.w;
          chosenWord.textContent = item.w;
          showToast("Selecionada");
        };

        wordList.appendChild(el);
      });
    }

    function renderHistory() {
      history.textContent = state.used.length
        ? state.used.join(", ")
        : "Nenhuma palavra usada ainda.";
    }

    function renderCounter() {
      const list = getWords();
      const yx = list.filter(item => item.priority).length;
      const free = list.filter(item => !item.used).length;
      counter.textContent = `${list.length} palavras · ${yx} Y/X · ${free} livres`;
    }

    function render() {
      dial.textContent = state.letter;
      chosenWord.textContent = state.chosen || "---";

      renderLetters();
      renderToggles();
      renderWords();
      renderHistory();
      renderCounter();
    }

    function chooseBest() {
      const list = getWords();
      const free = list.filter(item => !item.used);
      const base = free.length ? free : list;
      const strong = base.filter(item => item.priority);
      const finalList = strong.length ? strong : base;

      if (!finalList.length) {
        state.chosen = "";
        chosenWord.textContent = "---";
        showToast("Nada encontrado");
        return;
      }

      const selected = finalList[Math.floor(Math.random() * finalList.length)];
      state.chosen = selected.w;
      chosenWord.textContent = selected.w;
      showToast("Melhor palavra gerada");
    }

    async function copyWord() {
      if (!state.chosen) {
        showToast("Gere uma palavra");
        return;
      }

      try {
        await navigator.clipboard.writeText(state.chosen);
        showToast("Copiado");
      } catch {
        showToast("Não copiou");
      }
    }

    function markUsed() {
      if (!state.chosen) {
        showToast("Escolha uma palavra");
        return;
      }

      if (!state.used.includes(state.chosen)) {
        state.used.unshift(state.chosen);
        saveUsed();
      }

      showToast("Marcada");
      render();
    }

    function clearHistory() {
      state.used = [];
      saveUsed();
      showToast("Histórico limpo");
      render();
    }

    letterInput.addEventListener("input", () => {
      const value = normalize(letterInput.value).slice(0, 1).toUpperCase();
      if (!value) return;

      state.letter = value;
      letterInput.value = value;
      render();
    });

    document.getElementById("bestBtn").onclick = chooseBest;
    document.getElementById("copyBtn").onclick = copyWord;
    document.getElementById("markBtn").onclick = markUsed;
    document.getElementById("clearBtn").onclick = clearHistory;

    document.querySelectorAll("#langToggle div").forEach(el => {
      el.onclick = () => {
        state.lang = el.dataset.lang;
        render();
      };
    });

    document.querySelectorAll("#filterToggle div").forEach(el => {
      el.onclick = () => {
        state.filter = el.dataset.filter;
        render();
      };
    });

    const manifest = {
      name: "Letreiro Pro",
      short_name: "Letreiro",
      start_url: ".",
      display: "standalone",
      background_color: "#1f1e24",
      theme_color: "#1f1e24",
      orientation: "portrait",
      icons: []
    };

    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = url;
    document.head.appendChild(link);

    render();
  </script>
</body>
</html>
