<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

  <title>Letreiro Pro</title>

  <meta name="theme-color" content="#14141a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Letreiro Pro" />

  <style>
    :root {
      --font-mono: "Courier New", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

      --bg-base: #14141a;
      --bg-panel: #1f1e24;
      --bg-chip: #292832;
      --bg-input: #141319;

      --line: #373641;
      --text-primary: #f1eee8;
      --text-muted: #9b98aa;

      --accent-yellow: #f4c95d;
      --accent-teal: #2fc4a8;
      --accent-red: #ff6688;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-sans);
      min-height: 100vh;
      min-height: 100dvh;
      display: block;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg-panel);
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(31, 30, 36, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dial {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--bg-base);
      border: 1px solid var(--line);
      color: var(--accent-yellow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 800;
    }

    .top-info {
      flex: 1;
      min-width: 0;
    }

    .title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .subtitle {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .body {
      padding: 14px;
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 18px 2px 8px;
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 8px;
    }

    input {
      width: 100%;
      height: 48px;
      border-radius: 13px;
      border: 1px solid var(--line);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 18px;
      font-weight: 800;
      padding: 0 14px;
      outline: none;
      text-transform: uppercase;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 900;
    }

    .best-btn {
      height: 48px;
      border-radius: 13px;
      background: var(--accent-yellow);
      color: #211a05;
      font-size: 14px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.16);
    }

    .letters {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 6px;
    }

    .letter-btn {
      aspect-ratio: 1;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: var(--bg-chip);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 800;
      user-select: none;
    }

    .letter-btn.active {
      background: var(--accent-yellow);
      border-color: var(--accent-yellow);
      color: #211a05;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.18);
    }

    .toggle {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--bg-chip);
      border: 1px solid var(--line);
      border-radius: 13px;
    }

    .toggle-btn {
      flex: 1;
      padding: 11px 5px;
      border-radius: 10px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 900;
      user-select: none;
    }

    .toggle-btn.active.teal {
      background: var(--accent-teal);
      color: #061f1a;
    }

    .toggle-btn.active.yellow {
      background: var(--accent-yellow);
      color: #211a05;
    }

    .suggestion-box {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 8px;
    }

    .chosen {
      min-height: 58px;
      border-radius: 14px;
      background: var(--bg-input);
      border: 1px solid var(--line);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .chosen small {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .chosen-word {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 900;
      color: var(--accent-yellow);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      border-radius: 14px;
      background: var(--accent-teal);
      color: #061f1a;
      font-size: 14px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .secondary-btn {
      height: 44px;
      border-radius: 13px;
      background: var(--bg-chip);
      border: 1px solid var(--line);
      color: var(--text-primary);
      font-size: 13px;
    }

    .danger-btn {
      height: 44px;
      border-radius: 13px;
      background: transparent;
      border: 1px solid rgba(255, 102, 136, 0.55);
      color: var(--accent-red);
      font-size: 13px;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .word-tile {
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--bg-chip);
      color: var(--text-primary);
      padding: 8px 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
    }

    .word-tile.priority {
      border-color: var(--accent-yellow);
      color: var(--accent-yellow);
    }

    .word-tile.used {
      opacity: 0.38;
      text-decoration: line-through;
    }

    .flag {
      font-size: 9px;
      padding: 2px 4px;
      border-radius: 5px;
      background: var(--bg-base);
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-decoration: none;
    }

    .empty {
      width: 100%;
      padding: 18px 8px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      border: 1px dashed var(--line);
      border-radius: 13px;
    }

    .history {
      border-top: 1px solid var(--line);
      margin-top: 22px;
      padding-top: 12px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .history strong {
      color: var(--text-primary);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      background: #0f0f14;
      border: 1px solid var(--line);
      color: var(--text-primary);
      padding: 11px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 720px) {
      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 24px;
      }

      .app {
        max-width: 440px;
        min-height: auto;
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      }

      .topbar {
        padding-top: 14px;
        border-radius: 22px 22px 0 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="dial" id="dial">S</div>

      <div class="top-info">
        <div class="title">Letreiro Pro</div>
        <div class="subtitle" id="counter">Carregando palavras…</div>
      </div>
    </header>

    <section class="body">
      <div class="section-label">Letra rápida</div>

      <div class="quick-row">
        <input id="letterInput" maxlength="1" value="S" autocomplete="off" />
        <button class="best-btn" id="bestBtn">Melhor</button>
      </div>

      <div class="section-label">Letra inicial</div>
      <div class="letters" id="letters"></div>

      <div class="section-label">Idioma</div>
      <div class="toggle" id="langToggle">
        <div class="toggle-btn teal active" data-lang="both">PT + EN</div>
        <div class="toggle-btn teal" data-lang="pt">PT</div>
        <div class="toggle-btn teal" data-lang="en">EN</div>
      </div>

      <div class="section-label">Filtro</div>
      <div class="toggle" id="filterToggle">
        <div class="toggle-btn yellow active" data-filter="all">Todas</div>
        <div class="toggle-btn yellow" data-filter="priority">Só Y/X</div>
        <div class="toggle-btn yellow" data-filter="unused">Sem repetidas</div>
      </div>

      <div class="section-label">Sugestão</div>
      <div class="suggestion-box">
        <div class="chosen">
          <small>Palavra escolhida</small>
          <div class="chosen-word" id="chosenWord">---</div>
        </div>

        <button class="copy-btn" id="copyBtn">Copiar</button>
      </div>

      <div class="action-row">
        <button class="secondary-btn" id="markBtn">Marcar usada</button>
        <button class="danger-btn" id="clearBtn">Limpar histórico</button>
      </div>

      <div class="section-label">Palavras <span style="color: var(--accent-yellow);">●</span> = termina em Y/X</div>
      <div class="word-list" id="wordList"></div>

      <div class="section-label">Histórico</div>
      <div class="history" id="historyBox">Nenhuma palavra usada ainda.</div>
    </section>
  </main>

  <div class="toast" id="toast">Copiado</div>

      { w: "vitoria", l: "pt" },
      { w: "vulcao", l: "pt" },

      { w: "victory", l: "en" },
      { w: "variety", l: "en" },
      { w: "vertex", l: "en" },
      { w: "very", l: "en" },
      { w: "vanity", l: "en" },

      { w: "way", l: "en" },
      { w: "windy", l: "en" },
      { w: "worthy", l: "en" },
      { w: "wax", l: "en" },
      { w: "whisky", l: "en" },

      { w: "xerox", l: "pt" },
      { w: "xale", l: "pt" },
      { w: "xadrez", l: "pt" },
      { w: "xerox", l: "en" },

      { w: "yoga", l: "pt" },
      { w: "yak", l: "en" },
      { w: "yummy", l: "en" },

      { w: "zebra", l: "pt" },
      { w: "zero", l: "pt" },
      { w: "zangado", l: "pt" },
      { w: "zesty", l: "en" },
      { w: "zany", l: "en" }
    ];

    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    const state = {
      letter: "S",
      lang: "both",
      filter: "all",
      chosen: "",
      used: JSON.parse(localStorage.getItem("letreiro_used_words_v2") || "[]")
    };

    const dial = document.getElementById("dial");
    const counter = document.getElementById("counter");
    const letterInput = document.getElementById("letterInput");
    const lettersEl = document.getElementById("letters");
    const wordList = document.getElementById("wordList");
    const chosenWord = document.getElementById("chosenWord");
    const historyBox = document.getElementById("historyBox");
    const bestBtn = document.getElementById("bestBtn");
    const copyBtn = document.getElementById("copyBtn");
    const markBtn = document.getElementById("markBtn");
    const clearBtn = document.getElementById("clearBtn");
    const toast = document.getElementById("toast");

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function isPriority(word) {
      const clean = normalize(word);
      return clean.endsWith("y") || clean.endsWith("x");
    }

    function saveUsed() {
      localStorage.setItem("letreiro_used_words_v2", JSON.stringify(state.used));
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    function getWords() {
      const letter = normalize(state.letter).slice(0, 1);

      let list = WORDS.filter(item => {
        const cleanWord = normalize(item.w);
        const matchesLetter = cleanWord.startsWith(letter);
        const matchesLang = state.lang === "both" || item.l === state.lang;

        return matchesLetter && matchesLang;
      }).map(item => {
        return {
          ...item,
          priority: isPriority(item.w),
          used: state.used.includes(item.w)
        };
      });

      if (state.filter === "priority") {
        list = list.filter(item => item.priority);
      }

      if (state.filter === "unused") {
        list = list.filter(item => !item.used);
      }

      list.sort((a, b) => {
        if (a.used !== b.used) return a.used ? 1 : -1;
        if (a.priority !== b.priority) return b.priority - a.priority;
        return a.w.localeCompare(b.w);
      });

      return list;
    }

    function renderLetters() {
      lettersEl.innerHTML = "";

      ALPHABET.forEach(letter => {
        const btn = document.createElement("div");
        btn.className = "letter-btn" + (letter === state.letter ? " active" : "");
        btn.textContent = letter;

        btn.addEventListener("click", () => {
          state.letter = letter;
          letterInput.value = letter;
          render();
        });

        lettersEl.appendChild(btn);
      });
    }

    function renderWords() {
      const words = getWords();
      wordList.innerHTML = "";

      if (words.length === 0) {
        wordList.innerHTML = '<div class="empty">Nenhuma palavra encontrada com essa letra e filtro.</div>';
        return;
      }

      words.forEach(item => {
        const tile = document.createElement("div");
        tile.className =
          "word-tile" +
          (item.priority ? " priority" : "") +
          (item.used ? " used" : "");

        tile.innerHTML = `
          <span>${item.w}</span>
          <span class="flag">${item.l.toUpperCase()}</span>
        `;

        tile.addEventListener("click", () => {
          state.chosen = item.w;
          chosenWord.textContent = item.w;
          showToast("Palavra selecionada");
        });

        wordList.appendChild(tile);
      });
    }

    function renderHistory() {
      if (state.used.length === 0) {
        historyBox.textContent = "Nenhuma palavra usada ainda.";
        return;
      }

      historyBox.innerHTML = `<strong>${state.used.length} usadas:</strong> ${state.used.join(", ")}`;
    }

    function renderCounter() {
      const words = getWords();
      const priorityCount = words.filter(item => item.priority).length;
      const freeCount = words.filter(item => !item.used).length;

      counter.textContent = `${words.length} palavras · ${priorityCount} Y/X · ${freeCount} livres`;
    }

    function renderToggles() {
      document.querySelectorAll("#langToggle .toggle-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === state.lang);
      });

      document.querySelectorAll("#filterToggle .toggle-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.filter === state.filter);
      });
    }

    function render() {
      dial.textContent = state.letter;
      chosenWord.textContent = state.chosen || "---";

      renderLetters();
      renderToggles();
      renderWords();
      renderHistory();
      renderCounter();
    }

    function chooseBest() {
      const words = getWords();
      const unused = words.filter(item => !item.used);
      const source = unused.length > 0 ? unused : words;

      if (source.length === 0) {
        state.chosen = "";
        chosenWord.textContent = "---";
        showToast("Nenhuma palavra encontrada");
        return;
      }

      const priority = source.filter(item => item.priority);
      const finalList = priority.length > 0 ? priority : source;
      const selected = finalList[Math.floor(Math.random() * finalList.length)];

      state.chosen = selected.w;
      chosenWord.textContent = selected.w;

      showToast("Melhor palavra gerada");
    }

    async function copyChosen() {
      if (!state.chosen) {
        showToast("Gere uma palavra primeiro");
        return;
      }

      try {
        await navigator.clipboard.writeText(state.chosen);
        showToast("Copiado");
      } catch (err) {
        showToast("Não deu para copiar");
      }
    }

    function markUsed() {
      if (!state.chosen) {
        showToast("Escolha uma palavra primeiro");
        return;
      }

      if (!state.used.includes(state.chosen)) {
        state.used.unshift(state.chosen);
        saveUsed();
      }

      showToast("Marcada como usada");
      render();
    }

    function clearHistory() {
      state.used = [];
      saveUsed();
      showToast("Histórico limpo");
      render();
    }

    letterInput.addEventListener("input", () => {
      const value = normalize(letterInput.value).slice(0, 1).toUpperCase();

      if (!value) return;

      state.letter = value;
      letterInput.value = value;
      render();
    });

    document.querySelectorAll("#langToggle .toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.lang = btn.dataset.lang;
        render();
      });
    });

    document.querySelectorAll("#filterToggle .toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.filter = btn.dataset.filter;
        render();
      });
    });

    bestBtn.addEventListener("click", chooseBest);
    copyBtn.addEventListener("click", copyChosen);
    markBtn.addEventListener("click", markUsed);
    clearBtn.addEventListener("click", clearHistory);

    const manifest = {
      name: "Letreiro Pro",
      short_name: "Letreiro",
      start_url: ".",
      display: "standalone",
      background_color: "#14141a",
      theme_color: "#14141a",
      orientation: "portrait",
      icons: []
    };

    const manifestBlob = new Blob([JSON.stringify(manifest)], {
      type: "application/manifest+json"
    });

    const manifestURL = URL.createObjectURL(manifestBlob);
    const manifestLink = document.createElement("link");
    manifestLink.rel = "manifest";
    manifestLink.href = manifestURL;
    document.head.appendChild(manifestLink);

    render();
  </script>
</body>
</html>
